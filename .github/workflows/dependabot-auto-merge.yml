name: Dependabot auto-merge

# Enables auto-merge on Dependabot pull requests for minor and patch updates.
# GitHub then merges them once the required status checks pass. Major updates are
# left out so they require a deliberate manual review. For this to take effect,
# enable Allow auto-merge in the repository settings and require the status checks
# on the protected branch.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto_merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for minor and patch updates
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
