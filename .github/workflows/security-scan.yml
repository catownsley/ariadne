name: Security Scan (PR Quick)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (Quick)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python

  bandit:
    name: Bandit (Quick SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]"

      - name: Run Bandit
        run: bandit -r pentester -f sarif -o bandit-results.sarif --exit-zero

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  pip-audit:
    name: Dependency Vulnerabilities (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan dependencies for vulnerabilities
        run: pip-audit -r requirements.txt --desc

      - name: Verify dependency integrity (hash check)
        run: pip install --no-deps --require-hashes --dry-run -r requirements.lock

  lock-sync:
    name: Lock File Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Verify requirements.lock matches requirements.txt
        run: |
          cp requirements.lock requirements.lock.committed
          pip-compile --quiet --generate-hashes --no-annotate --output-file=requirements.lock requirements.txt
          if ! diff <(grep -v '^#' requirements.lock.committed) <(grep -v '^#' requirements.lock) > /dev/null; then
            echo "::error::requirements.lock is out of sync with requirements.txt"
            echo "Regenerate it with pip-compile --generate-hashes --no-annotate --output-file=requirements.lock requirements.txt"
            diff <(grep -v '^#' requirements.lock.committed) <(grep -v '^#' requirements.lock) || true
            exit 1
          fi
          echo "Lock file in sync"
